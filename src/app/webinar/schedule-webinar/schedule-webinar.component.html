<h2>Schedule Webinar</h2>

<form (ngSubmit)="schedule()">

<label>Name</label>
<input type="text" [(ngModel)]="webinar.event_name" name="name" required>

<br><br>

<label>Date</label>
<input type="date" [(ngModel)]="webinar.event_date" name="date" required>

<br><br>

<label>Time</label>
<input type="time" [(ngModel)]="webinar.timing" name="time" required>

<br><br>

<button type="submit">Schedule Webinar</button>

</form>
