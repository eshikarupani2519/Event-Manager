<div class="webinar-page">

<div class="webinar-card">

<div class="header">

<h2 class="title">📅 Scheduled Webinars</h2>

<a routerLink="/schedule-webinar" class="schedule-btn">
+ Schedule Webinar
</a>

</div>

<div class="table-wrapper">

<table class="webinar-table">

<thead>

<tr>
<th>Webinar</th>
<th>Date</th>
<th>Time</th>
<th>Join</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let w of webinars">

<td class="event-name">{{w.event_name}}</td>

<td>{{w.event_date | date}}</td>

<td>{{w.timing}}</td>

<td>
<a class="join-btn" [routerLink]="['/webinar',w.meeting_id]">
Join
</a>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
