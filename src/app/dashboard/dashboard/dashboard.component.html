<div class="dashboard-container">

    <h2 class="dashboard-title">🚀 Event Dashboard</h2>

    <!-- Stats Cards -->
    <div class="stats-grid">

        <div class="stat-card">
            <h4>Total Events</h4>
            <p class="stat-number">{{totalEvents}}</p>
        </div>

        <div class="stat-card">
            <h4>Conferences</h4>
            <p class="stat-number">{{conferences}}</p>
        </div>

        <div class="stat-card">
            <h4>Workshops</h4>
            <p class="stat-number">{{workShops}}</p>
        </div>

        <div class="stat-card">
            <h4>Meetups</h4>
            <p class="stat-number">{{meetUps}}</p>
        </div>

    </div>


    <!-- Chart Section -->
    <div class="chart-card">

        <h4 class="chart-title">Event Distribution</h4>

        <div class="chart-container">
            <canvas id="mainBoardIpoChart"></canvas>
        </div>

        <div class="legend-row">

            <div class="legend-item">
                <span class="legend-circle conference"></span>
                Conferences
            </div>

            <div class="legend-item">
                <span class="legend-circle workshop"></span>
                Workshops
            </div>

            <div class="legend-item">
                <span class="legend-circle meetup"></span>
                Meetups
            </div>

        </div>

    </div>

    <!-- Webinar Actions -->
    <div class="dashboard-actions">

        <a routerLink="/schedule-webinar" class="action-btn primary-btn">
            🎤 Schedule Webinar
        </a>

        <a routerLink="/webinars" class="action-btn secondary-btn">
            📺 View Webinars
        </a>

    </div>

</div>
