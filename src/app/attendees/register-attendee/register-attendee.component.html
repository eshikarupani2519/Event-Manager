<div class="attendee-page">

<div class="attendee-card">

<h2 class="page-title">🎟 Register for an Event</h2>

<form [formGroup]="registerFormGroup" (ngSubmit)="submitData()" class="attendee-form">

<!-- Name -->

<div class="form-group">

<label>Name</label>

<input
type="text"
placeholder="Enter name"
formControlName="name">

<p *ngIf="isEmailRequired('name')" class="error">
Name required
</p>

</div>

<!-- Email -->

<div class="form-group">

<label>Email Address</label>

<input
type="text"
placeholder="Enter email"
formControlName="email">

<p *ngIf="isEmailValid('email')" class="error">
Email should be valid
</p>

<p *ngIf="isEmailRequired('email')" class="error">
Email required
</p>

</div>

<!-- Phone -->

<div class="form-group">

<label>Phone</label>

<input
type="number"
placeholder="Phone number"
formControlName="phone">

<p *ngIf="isEmailRequired('phone')" class="error">
Phone required
</p>

</div>

<!-- Event -->

<div class="form-group">

<label>Select Event</label>

<select formControlName="event">

<option *ngFor="let event of events" value="{{event.event_name}}">
{{event.event_name}}
</option>

</select>

<p *ngIf="isEmailRequired('event')" class="error">
Event name required
</p>

</div>

<button class="register-btn">
Register
</button>

</form>

</div>

</div>
