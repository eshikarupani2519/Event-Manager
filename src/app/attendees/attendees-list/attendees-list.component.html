<div class="attendees-page">

  <div class="attendees-card">

    <h2 class="page-title">👥 Event Attendees</h2>

    <!-- Dropdown -->

    <div class="select-group">

      <label for="eventSelect">Select Event</label>

      <select
        id="eventSelect"
        [(ngModel)]="selectedEventId"
        (change)="onEventChange()">

        <option [ngValue]="null">Select an Event</option>

        <option
          *ngFor="let event of events"
          [ngValue]="event.event_id">

          {{ event.event_name }}

        </option>

      </select>

    </div>


    <!-- Attendees -->

    <div class="attendees-section" *ngIf="selectedEventId">

      <h3 class="attendees-title">Attendees</h3>

      <ul class="attendees-list" *ngIf="attendees">

        <li *ngFor="let attendee of attendees">

          <span class="attendee-icon">🎟</span>

          {{ attendee.att_name }}

        </li>

      </ul>

      <p class="no-attendees" *ngIf="attendeesLength==0">
        No attendees registered for this event.
      </p>

    </div>

  </div>

</div>

<!-- Loader -->

<div *ngIf="isLoading" class="loader-overlay">

  <div class="spinner"></div>

  <p>Loading attendees...</p>

</div>
