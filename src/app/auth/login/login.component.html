<div class="container col-lg-4 col-md-6 col-sm-7">
    <h4 class="text-center">Login</h4>

    <form [formGroup]="loginForm" class="font-poppins" (ngSubmit)="submitForm()">
        <div class="login-form">
            <div class="my-3">
                <label for="email" class="my-1">Username</label>
                <div>
                    <input type="text" placeholder="Enter username" formControlName="username" />
                </div>
            </div>

            <p *ngIf="isEmailValid('email')" class="text-danger">email should be valid</p>
            <p *ngIf="isRequired('email')" class="text-danger">email required</p>

            <div class="my-3">
                <div class="d-flex justify-content-between">
                    <label for="password" class="my-1">Password</label>
                </div>

                <div class="d-flex">
                    <input #passwordInput type="password" class="password-input" placeholder="Password"
                        formControlName="password" />
                    <i #eyeIcon id="togglePassword" (click)="showPassword(passwordInput, eyeIcon)"
                        class="fa-regular fa-eye fa-2x mx-1 eye-icon"></i>
                </div>
            </div>

            <p *ngIf="inValidCredentials" class="text-danger">Username or password is incorrect</p>
        </div>


        <button class="btn my-3" type="submit">Login</button>
       
    </form>
</div>
