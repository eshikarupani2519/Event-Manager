<div class="event-form-page">

    <div class="event-form-card">

        <h2 class="form-title">🎤 {{formTitle}}</h2>

        <form class="event-form"
            [formGroup]="addEventForm"
            (ngSubmit)="onSubmit()">

            <!-- Name -->
            <div class="form-group">

                <label>Name</label>

                <input
                    type="text"
                    formControlName="event_name"
                    placeholder="Enter event name">

                <p *ngIf="isFormControlError('name')" class="errors">
                    Name is required
                </p>

            </div>


            <!-- Description -->

            <div class="form-group">

                <label>Description</label>

                <input
                    type="text"
                    formControlName="event_description"
                    placeholder="Enter event description">

                <p *ngIf="isFormControlError('description')" class="errors">
                    Description is required
                </p>

            </div>


            <!-- Date -->

            <div class="form-group">

                <label>Date</label>

                <input
                    type="date"
                    formControlName="event_date">

                <p *ngIf="isFormControlError('date')" class="errors">
                    Date is required
                </p>

            </div>


            <!-- Type -->

            <div class="form-group">

                <label>Type</label>

                <select formControlName="event_type">

                    <option value="Conference">Conference</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Meetup">Meetup</option>

                </select>

                <p *ngIf="isFormControlError('type')" class="errors">
                    Type is required
                </p>

            </div>


            <!-- Timing -->

            <div class="form-group">

                <label>Timing</label>

                <input
                    type="time"
                    formControlName="timing">

                <p *ngIf="isFormControlError('timing')" class="errors">
                    Timing is required
                </p>

            </div>


            <!-- Submit -->

            <button
                type="submit"
                class="submit-btn"
                [disabled]="addEventForm.invalid">

                {{formTitle}}

            </button>

        </form>

    </div>

</div>
