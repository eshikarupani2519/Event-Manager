<div class="events-container">

    <div class="events-card">

        <h2 class="page-title">🎉 Events</h2>
        <h6 class="event-count" *ngIf="events">Total events: {{events.length}}</h6>

        <!-- Actions -->
        <div class="events-actions">

            <button class="add-event-btn" (click)="addEvent()" [class.disabled-link]="isLoading">
                <i class="fa-solid fa-plus me-2"></i>Add Event
            </button>

            <select name="type"
                [(ngModel)]="selectedType"
                (change)="filterByType()"
                class="event-filter"
                [class.disabled-link]="isLoading">

                <option value="All">All</option>
                <option value="Workshop">Workshop</option>
                <option value="Conference">Conference</option>
                <option value="Meetup">Meetup</option>

            </select>

        </div>


        <!-- Table -->
        <div class="table-wrapper">

            <table class="event-table">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                    <tr *ngFor="let event of paginatedEvents">

                        <td>{{event.event_name}}</td>
                        <td>
                            <span class="type-badge">
                                {{event.event_type}}
                            </span>
                        </td>

                        <td>{{event.event_date}}</td>

                        <td class="actions">

                            <i class="fa-regular fa-trash-can delete-icon"
                                (click)="deleteEvent(event.event_id)"
                                [class.disabled-link]="isLoading"></i>

                            <!-- <i class="fa-solid fa-pen-to-square edit-icon"
                                (click)="editEvent(event.event_id)"
                                [class.disabled-link]="isLoading"></i> -->

                            <i class="fa-regular fa-eye view-icon"
                                (click)="viewDetails(event)"
                                [class.disabled-link]="isLoading"></i>

                        </td>

                    </tr>

                    <tr *ngIf="paginatedEvents.length === 0 && !isLoading">
                        <td colspan="4" class="no-events">No Events Found</td>
                    </tr>

                </tbody>

            </table>

        </div>


        <!-- Pagination -->

        <ul class="pagination">

            <li [class.disabled]="currentPage === 1 || isLoading">

                <a href="#" (click)="goToPreviousPage($event)">
                    <i class="fa-solid fa-angle-left"></i>
                </a>

            </li>

            <li *ngFor="let page of totalPagesArray"
                [class.active]="page === currentPage"
                [class.disabled]="isLoading">

                <a href="#" (click)="goToPage($event, page)">
                    {{page}}
                </a>

            </li>

            <li [class.disabled]="currentPage === totalPages || isLoading">

                <a href="#" (click)="goToNextPage($event)">
                    <i class="fa-solid fa-angle-right"></i>
                </a>

            </li>

        </ul>

    </div>

</div>


<!-- Loader -->

<div *ngIf="isLoading" class="loader-overlay">
    <div class="spinner"></div>
    <p>Processing request...</p>
</div>
